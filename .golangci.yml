version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - misspell
    - noctx
    - prealloc
    - unconvert
    - unparam
    - whitespace
  disable:
    - gochecknoinits
  settings:
    gosec:
      excludes:
        - G101
        - G204
        - G301
        - G304
        - G306
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - unparam

issues:
  max-same-issues: 10
